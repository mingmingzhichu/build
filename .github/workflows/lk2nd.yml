name: Build lk2nd via pmbootstrap

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install pmbootstrap
        run: |
          sudo apt update
          sudo apt install -y python3-pip
          pip3 install pmbootstrap

      - name: Init pmbootstrap for hotdogb
        run: |
          pmbootstrap init --device=oneplus-hotdogb --ui=none

      - name: Build lk2nd package
        run: |
          pmbootstrap build --force lk2nd

      - name: Extract lk2nd.img
        run: |
          pmbootstrap export
          mkdir -p dist
          cp ~/.local/var/pmbootstrap/chroot_rootfs_*/boot/lk2nd.img dist/ 2>/dev/null || true

      - name: Upload lk2nd.img
        uses: actions/upload-artifact@v4
        with:
          name: lk2nd-hotdogb-post-official
          path: dist/lk2nd.img
