name: Repo Compare - Generate Patch (git clone)
# 触发方式：手动触发（推荐），可添加push/tag自动触发
on:
  workflow_dispatch:

jobs:
  generate-patch:
    runs-on: ubuntu-latest
    steps:
      # 步骤1：创建工作目录，规整仓库存放路径
      - name: Create work dir
        run: |
          mkdir -p ~/repo-base ~/repo-target
          echo "BASE_REPO=~/repo-base" >> $GITHUB_ENV
          echo "TARGET_REPO=~/repo-target" >> $GITHUB_ENV

      # 步骤2：git clone 基准仓库（对比基准，直接改仓库地址/分支）
      - name: Clone base repository
        run: |
          git clone --depth=1 -b sixteen https://github.com/yaap/kernel_oneplus_sm8150.git ${{ env.BASE_REPO }}
          # --depth 1：浅克隆（提速），--branch 后跟基准分支，替换为实际值

      # 步骤3：git clone 对比仓库（要找差异的仓库，直接改仓库地址/分支）
      - name: Clone target repository
        run: |
          git clone --depth=1 -b sixteen https://github.com/mingmingzhichu/kernel_oneplus_sm8150.git ${{ env.TARGET_REPO }}
          # 替换为实际的对比仓库地址和分支

      # 步骤4：安装diffutils（生成patch必备工具，ubuntu基础镜像可能无）
      - name: Install diffutils
        run: sudo apt update -y && sudo apt install -y diffutils

      # 步骤5：生成patch，排除.git/.github等目录（核心步骤）
      - name: Generate diff patch (exclude special dirs/files)
        run: |
          # 直接写死排除项，按需增删--exclude行，空格/换行分隔均可
          diff -Naur /home/runner/work/repo-base /home/runner/work/repo-target  > /home/runner/work/repo-compare.patch
          
          # 日志打印patch信息，便于排查
          echo "===== Patch File Info ====="
          ls -lh /home/runner/work/repo-compare.patch
          echo "===== Patch Preview (first 30 lines) ====="
          cat /home/runner/work/repo-compare.patch | head -30
          echo "==========================="

      # 步骤6：上传patch为Action产物，可直接下载
      - name: Upload patch artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-compare-patch
          path: /home/runner/work/repo-compare.patch
          retention-days: 14 # 产物保留14天，最大支持90天
