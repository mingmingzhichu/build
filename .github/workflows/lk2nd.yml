name: Build postmarketOS lk2nd for hotdogb

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            device-tree-compiler \
            git

      - name: Clone postmarketOS lk2nd
        run: |
          git clone https://gitlab.com/postmarketOS/lk2nd.git
          cd lk2nd

      - name: Build lk2nd for hotdogb
        run: |
          cd lk2nd
          make -j$(nproc) \
            TOOLCHAIN_PREFIX=aarch64-linux-gnu- \
            lk2nd-sm8150-hotdogb

      - name: Upload lk2nd.img
        uses: actions/upload-artifact@v4
        with:
          name: lk2nd-hotdogb
          path: lk2nd/build-lk2nd-sm8150-hotdogb/lk2nd.img
