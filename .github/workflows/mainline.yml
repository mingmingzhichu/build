name: Build main kernel with Clang

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Set swap to 10G
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential flex bison bc \
            libncurses-dev libelf-dev libssl-dev libdw-dev \
            fakeroot dpkg-dev debhelper \
            git curl axel rsync python3 file \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi g++-arm-linux-gnueabi \
            clang lld llvm

      - name: Setup Clang cross-wrapper
        run: |
          # 创建 aarch64-linux-gnu-clang 包装器
          sudo tee /usr/local/bin/aarch64-linux-gnu-clang << 'EOF'
          #!/bin/sh
          exec /usr/bin/clang --target=aarch64-linux-gnu "$@"
          EOF

          # 创建 aarch64-linux-gnu-clang++ 包装器
          sudo tee /usr/local/bin/aarch64-linux-gnu-clang++ << 'EOF'
          #!/bin/sh
          exec /usr/bin/clang++ --target=aarch64-linux-gnu "$@"
          EOF

          sudo chmod +x /usr/local/bin/aarch64-linux-gnu-clang /usr/local/bin/aarch64-linux-gnu-clang++

      - name: Build kernel
        run: |
          export KBUILD_BUILD_USER=mmzch
          export KBUILD_BUILD_HOST=localhost
          export ARCH=arm64

          # 使用包装器作为交叉编译器
          export CC=aarch64-linux-gnu-clang
          export CXX=aarch64-linux-gnu-clang++
          export LD=ld.lld
          export AR=llvm-ar
          export NM=llvm-nm
          export OBJCOPY=llvm-objcopy
          export OBJDUMP=llvm-objdump
          export STRIP=llvm-strip
          export LLVM=1
          export LLVM_IAS=1

          # 克隆源码
          git clone https://gitlab.postmarketos.org/soc/qualcomm-sm8150/linux.git -b sm8150/7.0-wip kernel --depth=1
          cd kernel

          # 追加配置
          echo "CONFIG_EFI_STUB=y" >> arch/arm64/configs/defconfig
          make ARCH=arm64 defconfig sm8150.config

          # 构建 deb 包（并行数可调节，-j$(nproc) 即可）
          make -j$(nproc) deb-pkg

          # 整理输出
          mkdir -p ~/output
          cp arch/arm64/boot/Image.gz ~/output/ || true
          cp arch/arm64/boot/dts/qcom/sm8150-oneplus-hotdogb.dtb ~/output/ || true
          cp .config ~/output/
          cp ../linux-*.deb ~/output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kernel-arm64-clang
          path: ~/output/