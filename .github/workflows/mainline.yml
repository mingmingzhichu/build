name: Build main kernel with Clang (prebuilt)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    steps:
      - name: Set swap to 10G
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 10

      - name: Install system build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential flex bison bc \
            libncurses-dev libelf-dev libssl-dev libdw-dev \
            fakeroot dpkg-dev debhelper \
            git curl axel rsync python3 file \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi g++-arm-linux-gnueabi

      - name: Clone prebuilt Clang toolchain
        run: |
          git clone https://gitlab.com/alphadroid-project/prebuilts_clang_host_linux-x86_clang-r547379.git \
            ~/clang --depth=1

      - name: Create Clang cross-wrapper (points to prebuilt Clang)
        run: |
          # 包装器用于欺骗 dpkg 架构检测
          sudo tee /usr/local/bin/aarch64-linux-gnu-clang << 'EOF'
          #!/bin/sh
          exec $HOME/clang/bin/clang --target=aarch64-linux-gnu "$@"
          EOF

          sudo tee /usr/local/bin/aarch64-linux-gnu-clang++ << 'EOF'
          #!/bin/sh
          exec $HOME/clang/bin/clang++ --target=aarch64-linux-gnu "$@"
          EOF

          sudo chmod +x /usr/local/bin/aarch64-linux-gnu-clang /usr/local/bin/aarch64-linux-gnu-clang++
          # 确保预编译 Clang 可执行
          chmod +x $HOME/clang/bin/clang $HOME/clang/bin/clang++ $HOME/clang/bin/ld.lld $HOME/clang/bin/llvm-ar

      - name: Build kernel
        run: |
          export KBUILD_BUILD_USER=mmzch
          export KBUILD_BUILD_HOST=localhost
          export ARCH=arm64

          # 指向包装器（路径优先）
          export CC=aarch64-linux-gnu-clang
          export CXX=aarch64-linux-gnu-clang++
          export LD=$HOME/clang/bin/ld.lld
          export AR=$HOME/clang/bin/llvm-ar
          export NM=$HOME/clang/bin/llvm-nm
          export OBJCOPY=$HOME/clang/bin/llvm-objcopy
          export OBJDUMP=$HOME/clang/bin/llvm-objdump
          export STRIP=$HOME/clang/bin/llvm-strip
          export LLVM=1
          export LLVM_IAS=1

          git clone https://gitlab.postmarketos.org/soc/qualcomm-sm8150/linux.git -b sm8150/7.0-wip kernel --depth=1
          cd kernel
          echo "CONFIG_EFI_STUB=y" >> arch/arm64/configs/defconfig
          make ARCH=arm64 defconfig sm8150.config
          make -j$(nproc) deb-pkg

          mkdir -p ~/output
          cp arch/arm64/boot/Image.gz ~/output/ || true
          cp arch/arm64/boot/dts/qcom/sm8150-oneplus-hotdogb.dtb ~/output/ || true
          cp .config ~/output/
          cp ../linux-*.deb ~/output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: kernel-arm64-clang-prebuilt
          path: ~/output/