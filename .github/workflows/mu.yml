name: Build mu_aloha_platforms for OnePlus 7T (hotdogb)

on:
  workflow_dispatch:
    inputs:
      device:
        description: '目标设备名称'
        required: true
        default: 'hotdogb'           
      build_target:
        description: '构建目标 (RELEASE/DEBUG)'
        required: false
        default: 'RELEASE'


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y mono-complete build-essential git python3 python3-pip

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 运行构建环境设置
        run: |
          chmod +x ./build_setup.sh
          ./build_setup.sh

      - name: 执行编译
        run: |
          
          DEVICE="${{ github.event.inputs.device || 'hotdogb' }}"
          TARGET="${{ github.event.inputs.build_target || 'RELEASE' }}"
          echo "正在构建设备: $DEVICE (目标: $TARGET)"
          ./build_uefi.py -d "$DEVICE" --buildtarget "$TARGET"

      - name: 上传构建产物
        uses: actions/upload-artifact@v6
        with:
          name: uefi-images-hotdogb      
          path: Build/